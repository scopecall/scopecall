# Local build override — builds the four service images from source instead of
# pulling pre-built images from ghcr.io.
#
# Use this for local end-to-end testing before images are published, or when
# testing local code changes.
#
# Usage (from the repo root):
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.build.yml up -d --build
#
# Each service still carries its `image:` name from the base file, so the locally
# built images are tagged as ghcr.io/scopecall/<svc>:${SCOPECALL_VERSION:-latest}.
# Build context paths are relative to THIS file's directory (infra/).

services:
  ingest:
    build:
      context: ../services-rust
      dockerfile: ingest/Dockerfile

  processor:
    # Repo-root context: the processor embeds schemas/redaction/patterns.yaml at
    # compile time via include_str!, so its build needs both schemas/ and services-rust/.
    build:
      context: ..
      dockerfile: services-rust/processor/Dockerfile

  api:
    build:
      context: ../services-go
      dockerfile: api/Dockerfile

  dashboard:
    build:
      context: ../services-dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AUTH_PROVIDER: authjs
