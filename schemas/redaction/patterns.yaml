version: 1

patterns:
  - name: EMAIL
    regex: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b'
    luhn_check: false
    enabled_by_default: true

  - name: CARD
    regex: '\b(?:\d{4}[-\s]?){3}\d{4}\b'
    luhn_check: true
    enabled_by_default: true

  - name: SSN
    regex: '\b\d{3}-\d{2}-\d{4}\b'
    luhn_check: false
    enabled_by_default: true

  - name: IP
    regex: '\b(?:\d{1,3}\.){3}\d{1,3}\b'
    luhn_check: false
    enabled_by_default: true

  - name: PHONE
    regex: '\b(?:\+?1[-.\s]?)?\(?\d{3}\)?[-.\s]\d{3}[-.\s]\d{4}\b'
    luhn_check: false
    enabled_by_default: true

# Order matters — EMAIL/CARD/SSN/IP must run before PHONE to avoid false matches
order:
  - EMAIL
  - CARD
  - SSN
  - IP
  - PHONE
