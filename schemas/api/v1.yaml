  /api/v1/traces/tree/{trace_id}:
    get:
      operationId: GetTraceTree
      summary: All spans for a given trace_id (for the tree view)
      parameters:
        - name: trace_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/OrgId"
        - name: from
          in: query
          required: false
          description: >
            Optional time window hint. When provided alongside `to`, narrows the
            ClickHouse partition scan to that window. Skipping this triggers a
            cheap min/max probe to bound the scan automatically. Pass the date
            range the user was on when they navigated to this trace.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: All spans for the trace, ordered by timestamp ascending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceTreeResponse"
        "401":
          $ref: "#/components/responses/Problem401"
        "403":
          $ref: "#/components/responses/Problem403"
        "404":
          $ref: "#/components/responses/Problem404"

